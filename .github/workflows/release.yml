name: Pipe 3 - Release/x.y.z -> Main (tag + GitHub release on merge)

on:
  pull_request:
    branches:
      - "main"
    types: [closed]

permissions:
  contents: write

concurrency:
  group: pipe3-main-release
  cancel-in-progress: true

jobs:
  publish:
    name: Generate tag and GitHub release on merge of release/x.y.z
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Validate release branch + extract version
        id: v
        shell: bash
        run: |
          set -euo pipefail
          head_ref="${{ github.event.pull_request.head.ref }}"
          sha="${{ github.event.pull_request.merge_commit_sha }}"

          echo "Merged PR head ref: $head_ref"
          echo "Merge commit sha: $sha"

          if [[ ! "$head_ref" =~ ^release/([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Not a release/x.y.z PR. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="${BASH_REMATCH[1]}"
          tag="v${version}"

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Create tag (if missing) pointing to merge commit
        if: steps.v.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = `${{ steps.v.outputs.tag }}`;
            const sha = `${{ steps.v.outputs.sha }}`;

            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
              core.info(`Tag ${tag} already exists. Skipping tag creation.`);
              return;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${tag}`,
              sha,
            });

            core.info(`Created tag ${tag} at ${sha}`);

      - name: Create or update GitHub release
        if: steps.v.outputs.skip == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.v.outputs.tag }}
          target_commitish: ${{ steps.v.outputs.sha }}
          generate_release_notes: true
          make_latest: true
          append_body: true
          body: |
            Release generated automatically after merge of `${{ github.event.pull_request.head.ref }}` into `main`.
